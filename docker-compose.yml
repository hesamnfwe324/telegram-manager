version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-tgmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tgmanager}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-tgmanager}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tgmanager}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-tgmanager}
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - backup_data:/tmp/backups
      - app_logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  backup_data:
  app_logs:
