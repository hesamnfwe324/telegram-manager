services:
  - type: worker
    name: tg-group-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: starter
    autoDeploy: true
    envVars:
      # ── Telegram User Client ──────────────────────────────────────────────────
      # IMPORTANT: Do NOT use Telegram Desktop credentials (API_ID=2040).
      # Register your own app at https://my.telegram.org/apps
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      # ── Telegram Bot ──────────────────────────────────────────────────────────
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      # ── Database & Redis ──────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: tg-manager-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tg-manager-redis
          type: redis
          property: connectionString
      # ── App config ────────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: APP_ENV
        value: production
      - key: BACKUP_DIR
        value: /tmp/backups
      - key: BACKUP_KEEP_DAYS
        value: "7"
      - key: BACKUP_DAILY_HOUR
        value: "3"
      # ── Daily join limit ──────────────────────────────────────────────────────
      # Safe threshold: 30 joins/day avoids Telegram account restrictions.
      # Do NOT raise above 50 without monitoring the account's health closely.
      - key: MAX_JOINS_PER_DAY
        value: "30"
      # ── Anti-detection delays ─────────────────────────────────────────────────
      # Random jitter in [MIN, MAX] seconds before each group join.
      # MIN MUST be less than MAX — equal values remove the randomness and
      # make the account look like a bot (pattern detection).
      # Recommended: 900s (15 min) to 1800s (30 min) for low-risk operation.
      - key: JOIN_DELAY_MIN
        value: "900"
      - key: JOIN_DELAY_MAX
        value: "1800"
      # ── PeerFlood protection ──────────────────────────────────────────────────
      # Pause this many seconds when PeerFlood is hit during user broadcast.
      # Abort the broadcast after MAX_PEER_FLOOD_PAUSES consecutive pauses.
      - key: PEER_FLOOD_PAUSE_SECONDS
        value: "1800"
      - key: MAX_PEER_FLOOD_PAUSES
        value: "3"
      # Delay between each DM via Telethon (increase if PeerFlood keeps hitting)
      - key: TG_DM_DELAY_SECONDS
        value: "5.0"
      # ── Retry config ──────────────────────────────────────────────────────────
      - key: RETRY_FAILED_JOINS
        value: "true"
      - key: RETRY_INTERVAL_HOURS
        value: "6"
      - key: RETRY_MAX_ATTEMPTS
        value: "3"
      # ── S3 backup (optional) ──────────────────────────────────────────────────
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false

  - type: redis
    name: tg-manager-redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: tg-manager-db
    databaseName: tgmanager
    user: tgmanager
    plan: starter
    region: frankfurt
