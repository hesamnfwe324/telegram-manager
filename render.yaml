services:
    - type: worker
      name: tg-group-manager
      runtime: docker
      dockerfilePath: ./Dockerfile
      dockerContext: .
      region: frankfurt
      plan: starter
      autoDeploy: true
      envVars:
        - key: TELEGRAM_API_ID
          sync: false
        - key: TELEGRAM_API_HASH
          sync: false
        - key: TELEGRAM_PHONE
          sync: false
        - key: TELEGRAM_SESSION_STRING
          sync: false
        - key: BOT_TOKEN
          sync: false
        - key: ADMIN_IDS
          sync: false
        - key: DATABASE_URL
          fromDatabase:
            name: tg-manager-db
            property: connectionString
        - key: REDIS_URL
          fromService:
            name: tg-manager-redis
            type: redis
            property: connectionString
        - key: LOG_LEVEL
          value: INFO
        - key: LOG_JSON
          value: "true"
        - key: APP_ENV
          value: production
        - key: BACKUP_DIR
          value: /tmp/backups
        - key: BACKUP_KEEP_DAYS
          value: "7"
        - key: BACKUP_DAILY_HOUR
          value: "3"
        - key: MAX_JOINS_PER_DAY
          value: "30"
        - key: JOIN_DELAY_MIN
          value: "900"
        - key: JOIN_DELAY_MAX
          value: "1800"
        - key: PEER_FLOOD_PAUSE_SECONDS
          value: "1800"
        - key: MAX_PEER_FLOOD_PAUSES
          value: "3"
        - key: TG_DM_DELAY_SECONDS
          value: "5.0"
        - key: RETRY_FAILED_JOINS
          value: "true"
        - key: RETRY_INTERVAL_HOURS
          value: "6"
        - key: RETRY_MAX_ATTEMPTS
          value: "3"
        - key: S3_BUCKET
          sync: false
        - key: S3_ENDPOINT
          sync: false
        - key: S3_ACCESS_KEY
          sync: false
        - key: S3_SECRET_KEY
          sync: false
        - key: GROK_API_KEY
          sync: false
        - key: CHANNEL_INVITE_LINK
          value: "https://t.me/addlist/4xJXMUc98LZhNGM8"
        - key: BOT_LINK
          value: "https://t.me/AmazonGiftCardBot?start=REF6538Q62Z"

    - type: redis
      name: tg-manager-redis
      plan: starter
      region: frankfurt
      maxmemoryPolicy: noeviction
      ipAllowList: []

    databases:
    - name: tg-manager-db
      databaseName: tgmanager
      user: tgmanager
      plan: starter
      region: frankfurt
    